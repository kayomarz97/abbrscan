<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AbbrScan</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="popup-root">
    <header>
      <span class="logo">AbbrScan</span>
      <span class="version">v1.5.4</span>
    </header>
    <div id="stats-section">
      <span id="abbr-count">—</span>
      <span id="count-label">loading...</span>
    </div>
    <div id="actions-section">
      <button id="scan-btn">↺  Scan This Page</button>
      <button id="show-sidebar-btn">☰  Show Sidebar</button>
    </div>
    <div id="toggle-section">
      <label for="enable-toggle">Enable on this page</label>
      <div class="toggle-wrap">
        <input type="checkbox" id="enable-toggle" checked>
        <span class="toggle-slider"></span>
      </div>
    </div>
    <footer>Decodes abbreviations in research papers</footer>
  </div>
  <script src="popup.js" defer></script>
</body>
</html>
